<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="40%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="card1-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="card2-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="85%" cy="15%" r="35%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="25%" cy="85%" r="30%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="grid-mask" cx="50%" cy="50%" r="50%">
      <stop offset="20%" stop-color="white" stop-opacity="1"/>
      <stop offset="70%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="0.5" stroke-opacity="0.4"/>
    </pattern>
    <mask id="grid-fade">
      <rect width="1200" height="630" fill="url(#grid-mask)"/>
    </mask>
    <filter id="card-shadow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#3fb950" flood-opacity="0.15"/>
    </filter>
    <filter id="card-shadow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#58a6ff" flood-opacity="0.15"/>
    </filter>
    <filter id="badge-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="dot-glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow-blue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#grid-fade)"/>

  <!-- Glow orbs -->
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>

  <!-- ==================== LEFT SIDE: TEXT ==================== -->

  <!-- Tag badge -->
  <rect x="64" y="168" width="152" height="34" rx="6" fill="#58a6ff" fill-opacity="0.1" stroke="#58a6ff" stroke-opacity="0.25" stroke-width="1"/>
  <!-- GitHub icon in tag -->
  <path d="M80 181c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 .75c1.795 0 3.25 1.455 3.25 3.25 0 1.436-.93 2.653-2.218 3.084-.163.031-.222-.07-.222-.155 0-.106.004-.455.004-.886 0-.38-.13-.63-.276-.756.906-.1 1.857-.445 1.857-2.01 0-.443-.158-.806-.417-1.09.042-.1.181-.516-.04-1.076 0 0-.34-.109-1.115.417a3.87 3.87 0 00-1.023-.138 3.87 3.87 0 00-1.023.138c-.775-.526-1.115-.417-1.115-.417-.221.56-.082.976-.04 1.076-.259.284-.417.647-.417 1.09 0 1.562.952 1.909 1.857 2.01-.117.098-.222.27-.259.524-.232.104-.823.284-1.187-.339-.072-.115-.292-.398-.6-.392-.329.006-.133.186.002.26.166.09.357.428.401.539.082.204.339.593.978.429 0 .275.002.534.002.61 0 .084-.06.186-.222.155A3.254 3.254 0 0176.75 185c0-1.795 1.455-3.25 3.25-3.25z" fill="#58a6ff"/>
  <text x="92" y="190" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#58a6ff" letter-spacing="1">DEVOPS GUIDE</text>

  <!-- Title -->
  <text x="64" y="248" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#e6edf3" letter-spacing="-1">Multiple</text>
  <text x="64" y="304" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="url(#accent-grad)" letter-spacing="-1">SSH Keys</text>
  <text x="64" y="360" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#e6edf3" letter-spacing="-1">for GitHub</text>

  <!-- Subtitle -->
  <text x="64" y="400" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="18" fill="#8b949e">Manage personal and work accounts on the</text>
  <text x="64" y="424" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="18" fill="#8b949e">same machine — the right way.</text>

  <!-- Platform pills -->
  <!-- Windows pill -->
  <rect x="64" y="454" width="112" height="36" rx="18" fill="#79c0ff" fill-opacity="0.06" stroke="#79c0ff" stroke-opacity="0.25" stroke-width="1"/>
  <path d="M82 467l4.5-.88v4.38H82zm5 -.98L92 465v5.5h-5zm-5 4.48h4.5v4.38L82 474.4zm5 0h5V476l-5-.83z" fill="#79c0ff"/>
  <text x="96" y="477" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="#79c0ff">Windows</text>

  <!-- macOS pill -->
  <rect x="186" y="454" width="104" height="36" rx="18" fill="#d2a8ff" fill-opacity="0.06" stroke="#d2a8ff" stroke-opacity="0.25" stroke-width="1"/>
  <path d="M207 475.5c-.5.75-1.03 1.47-1.83 1.48-.8.02-1.06-.47-1.97-.47-.92 0-1.2.46-1.96.49-.79.03-1.38-.79-1.89-1.52-1.04-1.5-1.83-4.23-.76-6.07.52-.91 1.46-1.49 2.47-1.5.77-.02 1.5.52 1.97.52.47 0 1.36-.64 2.28-.55.39.02 1.48.16 2.19 1.19-.06.04-1.3.77-1.29 2.29.02 1.81 1.59 2.42 1.61 2.43-.02.04-.25.86-.83 1.7zm-2.6-9.6c.44-.5 1.17-.88 1.77-.9.08.7-.2 1.41-.63 1.92-.42.51-1.1.91-1.77.85-.09-.69.25-1.41.63-1.87z" fill="#d2a8ff"/>
  <text x="218" y="477" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="#d2a8ff">macOS</text>

  <!-- Linux pill -->
  <rect x="300" y="454" width="100" height="36" rx="18" fill="#ffa657" fill-opacity="0.06" stroke="#ffa657" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Tux-inspired simple icon -->
  <circle cx="320" cy="471" r="6" fill="none" stroke="#ffa657" stroke-width="1.2"/>
  <circle cx="318.5" cy="469.5" r="0.8" fill="#ffa657"/>
  <circle cx="321.5" cy="469.5" r="0.8" fill="#ffa657"/>
  <path d="M318 473c0 0 1 1.2 2 1.2s2-1.2 2-1.2" fill="none" stroke="#ffa657" stroke-width="0.8" stroke-linecap="round"/>
  <text x="332" y="477" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="#ffa657">Linux</text>

  <!-- ==================== RIGHT SIDE: KEY VISUAL ==================== -->

  <!-- Personal key card (rotated -4deg) -->
  <g transform="translate(770, 115) rotate(-4)" filter="url(#card-shadow-green)">
    <rect width="300" height="170" rx="12" fill="#161b22" fill-opacity="0.92" stroke="url(#card1-border)" stroke-width="1.5"/>
    <!-- Subtle inner glow top edge -->
    <rect x="1" y="1" width="298" height="2" rx="1" fill="#3fb950" fill-opacity="0.1"/>

    <!-- Label row -->
    <circle cx="24" cy="30" r="4.5" fill="#3fb950" filter="url(#dot-glow-green)"/>
    <text x="38" y="34" font-family="'Courier New', monospace" font-size="10.5" font-weight="700" fill="#3fb950" letter-spacing="1.5">PERSONAL ACCOUNT</text>

    <!-- Key text -->
    <text x="24" y="64" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" fill-opacity="0.8">ssh-ed25519 AAAAC3Nza</text>
    <text x="24" y="82" font-family="'Courier New', monospace" font-size="11" fill="#3fb950" fill-opacity="0.9">C1lZDI1NTE5AAAAIGk8p</text>
    <text x="24" y="100" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" fill-opacity="0.6">xR3mK9v2...</text>

    <!-- Divider -->
    <line x1="24" y1="120" x2="276" y2="120" stroke="#30363d" stroke-opacity="0.6" stroke-width="1"/>

    <!-- File path -->
    <path d="M24 140v-8h5.25a1.25 1.25 0 011.25 1.25v5.5a1.25 1.25 0 01-1.25 1.25H24z M25.5 133.5v5h3a.5.5 0 00.5-.5v-4a.5.5 0 00-.5-.5h-3z" fill="#6e7681"/>
    <text x="38" y="141" font-family="'Courier New', monospace" font-size="11" fill="#6e7681">~/.ssh/id_ed25519_personal</text>
  </g>

  <!-- Work key card (rotated 3deg) -->
  <g transform="translate(740, 340) rotate(3)" filter="url(#card-shadow-blue)">
    <rect width="300" height="170" rx="12" fill="#161b22" fill-opacity="0.92" stroke="url(#card2-border)" stroke-width="1.5"/>
    <!-- Subtle inner glow top edge -->
    <rect x="1" y="1" width="298" height="2" rx="1" fill="#58a6ff" fill-opacity="0.1"/>

    <!-- Label row -->
    <circle cx="24" cy="30" r="4.5" fill="#58a6ff" filter="url(#dot-glow-blue)"/>
    <text x="38" y="34" font-family="'Courier New', monospace" font-size="10.5" font-weight="700" fill="#58a6ff" letter-spacing="1.5">WORK ACCOUNT</text>

    <!-- Key text -->
    <text x="24" y="64" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" fill-opacity="0.8">ssh-ed25519 AAAAC3Nza</text>
    <text x="24" y="82" font-family="'Courier New', monospace" font-size="11" fill="#58a6ff" fill-opacity="0.9">C1lZDI1NTE5AAAAIHjRw</text>
    <text x="24" y="100" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" fill-opacity="0.6">tP7nQ4x8...</text>

    <!-- Divider -->
    <line x1="24" y1="120" x2="276" y2="120" stroke="#30363d" stroke-opacity="0.6" stroke-width="1"/>

    <!-- File path -->
    <path d="M24 140v-8h5.25a1.25 1.25 0 011.25 1.25v5.5a1.25 1.25 0 01-1.25 1.25H24z M25.5 133.5v5h3a.5.5 0 00.5-.5v-4a.5.5 0 00-.5-.5h-3z" fill="#6e7681"/>
    <text x="38" y="141" font-family="'Courier New', monospace" font-size="11" fill="#6e7681">~/.ssh/id_ed25519_work</text>
  </g>

  <!-- Connector badge (centered between cards) -->
  <g transform="translate(848, 296)" filter="url(#badge-shadow)">
    <rect x="-72" y="-20" width="144" height="40" rx="10" fill="#161b22" fill-opacity="0.95" stroke="#f0f6fc" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Link icon -->
    <path d="M-48 2a3.5 3.5 0 005.3.38l2.1-2.1a3.5 3.5 0 00-4.95-4.95l-1.2 1.2" fill="none" stroke="#e6edf3" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M-36-2a3.5 3.5 0 00-5.3-.38l-2.1 2.1a3.5 3.5 0 004.95 4.95l1.2-1.2" fill="none" stroke="#e6edf3" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Text -->
    <text x="-26" y="5" font-family="'Courier New', monospace" font-size="12" font-weight="700" fill="#e6edf3" letter-spacing="0.5">~/.ssh/config</text>
  </g>

</svg>
