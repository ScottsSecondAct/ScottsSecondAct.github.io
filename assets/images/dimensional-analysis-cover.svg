<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Dimensional Analysis Cover</title>
  <desc id="desc">Blueprint-inspired graphic showing unit equations and compile-time dimensional analysis in modern C++.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#d9e9ff"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8aa5c6" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" rx="22"/>
  <rect width="1200" height="675" fill="url(#grid)" rx="22"/>

  <g font-family="'Trebuchet MS', Verdana, sans-serif" fill="#14324d">
    <text x="78" y="98" font-size="28" font-weight="700">Compile-Time Dimensional Analysis</text>
    <text x="78" y="132" font-size="20" fill="#2563a8">Modern C++20 Type Safety</text>

    <text x="90" y="245" font-size="34" font-weight="700" fill="#0f4c81">F = m * a</text>
    <text x="90" y="294" font-size="24">N = kg * m / s^2</text>
    <text x="90" y="336" font-size="22">[M L T^-2] = [M] * [L T^-2]</text>

    <text x="90" y="420" font-size="20" fill="#1e3a5f">Unit Cancellation:</text>
    <text x="90" y="455" font-size="24" fill="#0b395f">kg * m / s * s</text>
    <line x1="278" y1="444" x2="344" y2="444" stroke="#0b395f" stroke-width="2"/>
    <line x1="278" y1="460" x2="344" y2="460" stroke="#0b395f" stroke-width="2"/>
    <text x="90" y="495" font-size="22">=> momentum units (N*s)</text>
  </g>

  <g transform="translate(585,118)">
    <rect x="0" y="0" width="530" height="435" rx="16" fill="#0f2033" opacity="0.95"/>
    <rect x="16" y="16" width="498" height="44" rx="8" fill="#1a3553"/>
    <circle cx="38" cy="38" r="7" fill="#7dd3fc"/>
    <circle cx="62" cy="38" r="7" fill="#34d399"/>
    <circle cx="86" cy="38" r="7" fill="#fbbf24"/>

    <g font-family="Consolas, 'Courier New', monospace" font-size="20">
      <text x="30" y="108" fill="#7dd3fc">template&lt;typename D&gt; struct Quantity {</text>
      <text x="30" y="142" fill="#e2e8f0">  double value;</text>
      <text x="30" y="176" fill="#34d399">};</text>
      <text x="30" y="228" fill="#fbbf24">using Length = Dimensions&lt;0,1,0&gt;;</text>
      <text x="30" y="262" fill="#fbbf24">using Time   = Dimensions&lt;0,0,1&gt;;</text>
      <text x="30" y="314" fill="#a5b4fc">auto speed = meters / seconds;</text>
      <text x="30" y="348" fill="#fca5a5">// auto bad = meters + seconds;  // error</text>
      <text x="30" y="398" fill="#86efac">static_assert(IsQuantity&lt;decltype(speed)&gt;);</text>
    </g>
  </g>

  <g fill="#2563a8" font-family="'Trebuchet MS', Verdana, sans-serif">
    <text x="600" y="620" font-size="22" text-anchor="middle">From runtime ambiguity to compile-time certainty</text>
  </g>
</svg>
