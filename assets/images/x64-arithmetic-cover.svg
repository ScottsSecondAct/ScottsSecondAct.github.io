<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">x64 Arithmetic Cover</title>
  <desc id="desc">Assembly arithmetic instructions with registers and operations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" rx="20"/>

  <g font-family="'Trebuchet MS', Verdana, sans-serif" fill="#0f172a">
    <text x="75" y="90" font-size="40" font-weight="700">x86_64 Arithmetic Instructions</text>
    <text x="75" y="128" font-size="22" fill="#334155">ADD SUB MUL IMUL DIV IDIV</text>
  </g>

  <rect x="70" y="170" width="1060" height="430" rx="16" fill="#0f2033"/>
  <g font-family="Consolas, 'Courier New', monospace" font-size="28" fill="#cbd5e1">
    <text x="110" y="240">mov rax, 42</text>
    <text x="110" y="285">mov rbx, 10</text>
    <text x="110" y="330" fill="#86efac">add rax, rbx    ; 52</text>
    <text x="110" y="375" fill="#93c5fd">sub rax, 2      ; 50</text>
    <text x="110" y="420" fill="#fbbf24">imul rax, 4     ; 200</text>
    <text x="110" y="465" fill="#fca5a5">cqo</text>
    <text x="110" y="510" fill="#f9a8d4">idiv rcx        ; quotient, remainder</text>

    <text x="690" y="250" fill="#7dd3fc">RAX  00000000000000C8</text>
    <text x="690" y="300" fill="#7dd3fc">RBX  000000000000000A</text>
    <text x="690" y="350" fill="#7dd3fc">RDX  0000000000000000</text>
    <text x="690" y="410" fill="#34d399">FLAGS: ZF CF OF SF</text>
    <text x="690" y="500" fill="#e2e8f0">Intel syntax, Linux toolchain</text>
  </g>
</svg>
