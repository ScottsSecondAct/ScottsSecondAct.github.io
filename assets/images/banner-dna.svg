    <line x1="850"  y1="200" x2="850"  y2="275" stroke="#ff6b9d"/>
    <line x1="950"  y1="200" x2="950"  y2="275" stroke="#c8f560"/>
    <line x1="1050" y1="200" x2="1050" y2="275" stroke="#60d5f5"/>
