        stroke="#a0efff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.38"/>

  <!-- Base pair rungs with perspective depth.
       Each rung split at y=200: top half (receding) = dim/thin; bottom half (near viewer) = bright/thick.
       Bottom strand alternates which color is "front" each half-cycle, matching helix geometry. -->

  <!-- Back halves — peak rungs (y=125 → 200), dim/thin -->
  <g stroke-width="1.5" stroke-linecap="round" opacity="0.28">
    <line x1="50"   y1="125" x2="50"   y2="200" stroke="#ff6b9d"/>
    <line x1="150"  y1="125" x2="150"  y2="200" stroke="#c8f560"/>
    <line x1="250"  y1="125" x2="250"  y2="200" stroke="#60d5f5"/>
    <line x1="350"  y1="125" x2="350"  y2="200" stroke="#ffd60a"/>
    <line x1="450"  y1="125" x2="450"  y2="200" stroke="#ff6b9d"/>
    <line x1="550"  y1="125" x2="550"  y2="200" stroke="#c8f560"/>
    <line x1="650"  y1="125" x2="650"  y2="200" stroke="#60d5f5"/>
    <line x1="750"  y1="125" x2="750"  y2="200" stroke="#ffd60a"/>
    <line x1="850"  y1="125" x2="850"  y2="200" stroke="#ff6b9d"/>
    <line x1="950"  y1="125" x2="950"  y2="200" stroke="#c8f560"/>
    <line x1="1050" y1="125" x2="1050" y2="200" stroke="#60d5f5"/>
