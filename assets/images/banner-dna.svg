    <line x1="75"   y1="200" x2="75"   y2="253" stroke="#ff6b9d"/>
    <line x1="125"  y1="200" x2="125"  y2="253" stroke="#c8f560"/>
    <line x1="175"  y1="200" x2="175"  y2="253" stroke="#c8f560"/>
    <line x1="225"  y1="200" x2="225"  y2="253" stroke="#60d5f5"/>
