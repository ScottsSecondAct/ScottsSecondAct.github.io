        font-weight="bold" fill="#ffffff" opacity="0.08" letter-spacing="10">DNA DOUBLE HELIX</text>

  <!-- Nucleotide labels — all 16 rungs, valid Watson-Crick pairs.
       Even x (cyan on top): top=cyan base, bottom=magenta base.
       Odd x (magenta on top): top=magenta base, bottom=cyan base. -->
