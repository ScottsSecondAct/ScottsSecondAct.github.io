    <line x1="775"  y1="200" x2="775"  y2="253" stroke="#ffd60a"/>
    <line x1="825"  y1="200" x2="825"  y2="253" stroke="#ff6b9d"/>
    <line x1="875"  y1="200" x2="875"  y2="253" stroke="#ff6b9d"/>
    <line x1="925"  y1="200" x2="925"  y2="253" stroke="#c8f560"/>
    <line x1="975"  y1="200" x2="975"  y2="253" stroke="#c8f560"/>
    <line x1="1025" y1="200" x2="1025" y2="253" stroke="#60d5f5"/>
