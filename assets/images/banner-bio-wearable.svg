<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030d1c"/>
      <stop offset="60%" stop-color="#071422"/>
      <stop offset="100%" stop-color="#0a0e28"/>
    </linearGradient>
    <linearGradient id="deviceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a50"/>
      <stop offset="100%" stop-color="#0f2030"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050f1a"/>
      <stop offset="100%" stop-color="#081520"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deviceGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="400" fill="url(#bg)"/>

  <!-- Background circuit traces (subtle grid) -->
  <g stroke="#0d2a40" stroke-width="1" opacity="0.6">
    <!-- Horizontal traces -->
    <line x1="0" y1="80"  x2="480" y2="80"/><line x1="800" y1="80"  x2="1600" y2="80"/>
    <line x1="0" y1="160" x2="480" y2="160"/><line x1="800" y1="160" x2="1600" y2="160"/>
    <line x1="0" y1="240" x2="480" y2="240"/><line x1="800" y1="240" x2="1600" y2="240"/>
    <line x1="0" y1="320" x2="480" y2="320"/><line x1="800" y1="320" x2="1600" y2="320"/>
    <!-- Vertical traces -->
    <line x1="120" y1="0" x2="120" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/><line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/><line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="1320" y1="0" x2="1320" y2="400"/><line x1="1440" y1="0" x2="1440" y2="400"/>
  </g>

  <!-- Circuit junction dots -->
  <g fill="#0d3a55" opacity="0.8">
    <circle cx="120" cy="80" r="3.5"/><circle cx="240" cy="80" r="3.5"/><circle cx="360" cy="80" r="3.5"/>
    <circle cx="120" cy="160" r="3.5"/><circle cx="240" cy="160" r="3.5"/><circle cx="360" cy="160" r="3.5"/>
    <circle cx="120" cy="240" r="3.5"/><circle cx="240" cy="240" r="3.5"/><circle cx="360" cy="240" r="3.5"/>
    <circle cx="120" cy="320" r="3.5"/><circle cx="240" cy="320" r="3.5"/><circle cx="360" cy="320" r="3.5"/>
    <circle cx="960" cy="80" r="3.5"/><circle cx="1080" cy="80" r="3.5"/><circle cx="1200" cy="80" r="3.5"/>
    <circle cx="1320" cy="80" r="3.5"/><circle cx="1440" cy="80" r="3.5"/>
    <circle cx="960" cy="160" r="3.5"/><circle cx="1080" cy="160" r="3.5"/><circle cx="1200" cy="160" r="3.5"/>
    <circle cx="1320" cy="160" r="3.5"/><circle cx="1440" cy="160" r="3.5"/>
    <circle cx="960" cy="240" r="3.5"/><circle cx="1080" cy="240" r="3.5"/><circle cx="1200" cy="240" r="3.5"/>
    <circle cx="1320" cy="240" r="3.5"/><circle cx="1440" cy="240" r="3.5"/>
    <circle cx="960" cy="320" r="3.5"/><circle cx="1080" cy="320" r="3.5"/><circle cx="1200" cy="320" r="3.5"/>
    <circle cx="1320" cy="320" r="3.5"/><circle cx="1440" cy="320" r="3.5"/>
  </g>

  <!-- Main ECG biosignal waveform (orange, full width) -->
  <!-- One beat = 200px, centered at y=200, R-spike to y=75 -->
  <path d="M 0,200 L 18,200
           C 23,175 43,175 48,200 L 68,200 L 73,215 L 78,75 L 83,228 L 88,200
           L 110,200 C 115,168 150,168 165,200 L 200,200

           L 218,200 C 223,175 243,175 248,200 L 268,200 L 273,215 L 278,75 L 283,228 L 288,200
           L 310,200 C 315,168 350,168 365,200 L 400,200

           L 418,200 C 423,175 443,175 448,200 L 468,200 L 473,215 L 478,75 L 483,228 L 488,200
           L 510,200 C 515,168 550,168 565,200

           M 835,200 C 840,168 875,168 890,200 L 910,200

           L 1018,200 C 1023,175 1043,175 1048,200 L 1068,200 L 1073,215 L 1078,75 L 1083,228 L 1088,200
           L 1110,200 C 1115,168 1150,168 1165,200 L 1200,200

           L 1218,200 C 1223,175 1243,175 1248,200 L 1268,200 L 1273,215 L 1278,75 L 1283,228 L 1288,200
           L 1310,200 C 1315,168 1350,168 1365,200 L 1400,200

           L 1418,200 C 1423,175 1443,175 1448,200 L 1468,200 L 1473,215 L 1478,75 L 1483,228 L 1488,200
           L 1510,200 C 1515,168 1550,168 1565,200 L 1600,200"
        stroke="#ff8c42" stroke-width="2.5" fill="none" stroke-linecap="round"
        filter="url(#glow)" opacity="0.85"/>

  <!-- ECG baseline -->
  <line x1="560" y1="200" x2="640" y2="200" stroke="#ff8c42" stroke-width="2.5" opacity="0.5"/>
  <line x1="640" y1="200" x2="640" y2="200" stroke="#ff8c42" stroke-width="2.5" opacity="0"/>

  <!-- Left side: Molecular/cellular elements -->
  <!-- Hexagonal molecular structure (adenine-like) -->
  <g transform="translate(80, 200)" stroke="#1a5c80" stroke-width="1.5" fill="none" opacity="0.55">
    <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5"/>
    <polygon points="0,-25 21.5,-12.5 21.5,12.5 0,25 -21.5,12.5 -21.5,-12.5"/>
    <line x1="0" y1="-45" x2="0" y2="-62"/>
    <line x1="39" y1="-22.5" x2="54" y2="-31"/>
    <line x1="39" y1="22.5" x2="54" y2="31"/>
    <line x1="0" y1="45" x2="0" y2="62"/>
    <line x1="-39" y1="22.5" x2="-54" y2="31"/>
    <line x1="-39" y1="-22.5" x2="-54" y2="-31"/>
  </g>
  <text x="80" y="207" text-anchor="middle" font-family="Arial,sans-serif" font-size="11"
        fill="#2a8ab0" opacity="0.6">C₁₀H₁₃N₅O₄P</text>

  <!-- Small cellular nodes network -->
  <g stroke="#134e6f" stroke-width="1" opacity="0.5">
    <line x1="200" y1="100" x2="290" y2="130"/>
    <line x1="290" y1="130" x2="350" y2="90"/>
    <line x1="290" y1="130" x2="310" y2="180"/>
    <line x1="200" y1="300" x2="280" y2="270"/>
    <line x1="280" y1="270" x2="350" y2="310"/>
    <line x1="280" y1="270" x2="300" y2="220"/>
  </g>
  <g fill="#1a6e9a" opacity="0.6">
    <circle cx="200" cy="100" r="6"/><circle cx="290" cy="130" r="8"/>
    <circle cx="350" cy="90"  r="5"/><circle cx="310" cy="180" r="5"/>
    <circle cx="200" cy="300" r="6"/><circle cx="280" cy="270" r="8"/>
    <circle cx="350" cy="310" r="5"/><circle cx="300" cy="220" r="5"/>
  </g>

  <!-- WEARABLE DEVICE (centered at x=640, y=200) -->
  <!-- Device body glow -->
  <rect x="548" y="70" width="184" height="260" rx="32" ry="32" fill="#00e5d4" opacity="0.06" filter="url(#deviceGlow)"/>

  <!-- Device body -->
  <rect x="555" y="75" width="170" height="250" rx="28" ry="28" fill="url(#deviceGrad)" stroke="#2a5a78" stroke-width="2"/>

  <!-- Band top -->
  <rect x="595" y="30" width="90" height="52" rx="10" fill="#0f2030" stroke="#1a3a50" stroke-width="1.5"/>
  <!-- Band bottom -->
  <rect x="595" y="318" width="90" height="52" rx="10" fill="#0f2030" stroke="#1a3a50" stroke-width="1.5"/>

  <!-- Device screen -->
  <rect x="572" y="95" width="136" height="180" rx="10" fill="url(#screenGrad)" stroke="#0d3a52" stroke-width="1.5"/>

  <!-- Screen ECG trace (miniature, green) -->
  <path d="M 578,185 L 588,185
           C 590,178 594,178 596,185 L 599,185 L 600.5,189 L 602,163 L 603.5,191 L 605,185
           L 612,185 C 613,178 618,178 620,185 L 630,185

           L 636,185 C 638,178 642,178 644,185 L 647,185 L 648.5,189 L 650,163 L 651.5,191 L 653,185
           L 660,185 C 661,178 666,178 668,185 L 680,185

           L 686,185 C 688,178 692,178 694,185 L 700,185"
        stroke="#3ddc84" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Screen: Heart rate display -->
  <text x="640" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60cfff" opacity="0.7">HEART RATE</text>
  <text x="640" y="148" text-anchor="middle" font-family="'Courier New',monospace" font-size="26" font-weight="bold" fill="#3ddc84" filter="url(#glow)">72</text>
  <text x="640" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60cfff" opacity="0.7">BPM</text>

  <!-- Screen: SpO2 -->
  <text x="590" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60cfff" opacity="0.6">SpO₂</text>
  <text x="590" y="240" text-anchor="middle" font-family="'Courier New',monospace" font-size="15" fill="#ff8c42" font-weight="bold">98%</text>

  <!-- Screen: Temp -->
  <text x="690" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60cfff" opacity="0.6">TEMP</text>
  <text x="690" y="240" text-anchor="middle" font-family="'Courier New',monospace" font-size="14" fill="#ff8c42" font-weight="bold">36.8°</text>

  <!-- Device side crown/button -->
  <rect x="723" y="168" width="7" height="30" rx="3" fill="#1e4060" stroke="#2a5a78" stroke-width="1"/>

  <!-- Device LED indicators at bottom -->
  <circle cx="622" cy="290" r="4" fill="#3ddc84" opacity="0.9" filter="url(#glow)"/>
  <circle cx="640" cy="290" r="4" fill="#ff8c42" opacity="0.8"/>
  <circle cx="658" cy="290" r="4" fill="#60cfff" opacity="0.8"/>

  <!-- Right side: Vital signs data panel -->
  <!-- Data connection lines from device to panel -->
  <g stroke="#1a5c80" stroke-width="1" stroke-dasharray="4,3" opacity="0.45">
    <line x1="725" y1="140" x2="900" y2="100"/>
    <line x1="725" y1="185" x2="900" y2="185"/>
    <line x1="725" y1="240" x2="900" y2="270"/>
  </g>

  <!-- Vital sign cards -->
  <!-- Heart Rate card -->
  <rect x="910" y="60" width="180" height="80" rx="8" fill="#081520" stroke="#1a4060" stroke-width="1.5" opacity="0.9"/>
  <text x="1000" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#60cfff" opacity="0.8">♥ Heart Rate</text>
  <text x="1000" y="112" text-anchor="middle" font-family="'Courier New',monospace" font-size="28" font-weight="bold" fill="#3ddc84" filter="url(#glow)">72 BPM</text>

  <!-- SpO2 card -->
  <rect x="1110" y="60" width="180" height="80" rx="8" fill="#081520" stroke="#1a4060" stroke-width="1.5" opacity="0.9"/>
  <text x="1200" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#60cfff" opacity="0.8">○ Blood Oxygen</text>
  <text x="1200" y="112" text-anchor="middle" font-family="'Courier New',monospace" font-size="28" font-weight="bold" fill="#ff8c42" filter="url(#glow)">SpO₂ 98%</text>

  <!-- Temperature card -->
  <rect x="1310" y="60" width="220" height="80" rx="8" fill="#081520" stroke="#1a4060" stroke-width="1.5" opacity="0.9"/>
  <text x="1420" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#60cfff" opacity="0.8">◈ Core Temperature</text>
  <text x="1420" y="112" text-anchor="middle" font-family="'Courier New',monospace" font-size="28" font-weight="bold" fill="#ff8c42" filter="url(#glow)">36.8 °C</text>

  <!-- EEG / Neural Activity card -->
  <rect x="910" y="165" width="620" height="70" rx="8" fill="#081520" stroke="#1a4060" stroke-width="1.5" opacity="0.9"/>
  <text x="930" y="186" font-family="Arial,sans-serif" font-size="11" fill="#60cfff" opacity="0.8">≋ Neural Activity (EEG)</text>
  <!-- Mini EEG noise-like waveform -->
  <path d="M 930,210 L 940,210 L 943,202 L 946,218 L 950,210 L 955,206 L 958,214 L 962,210
           L 968,210 L 971,200 L 974,220 L 978,210 L 983,207 L 986,213 L 990,210
           L 996,210 L 999,203 L 1002,217 L 1006,210 L 1011,208 L 1014,212 L 1018,210
           L 1024,210 L 1027,201 L 1030,219 L 1034,210 L 1039,206 L 1042,214 L 1046,210
           L 1052,210 L 1055,204 L 1058,216 L 1062,210 L 1067,209 L 1070,211 L 1074,210
           L 1080,210 L 1083,200 L 1086,220 L 1090,210 L 1095,207 L 1098,213 L 1102,210
           L 1108,210 L 1111,202 L 1114,218 L 1118,210 L 1123,208 L 1126,212 L 1130,210
           L 1136,210 L 1139,199 L 1142,221 L 1146,210 L 1151,205 L 1154,215 L 1158,210
           L 1164,210 L 1167,203 L 1170,217 L 1174,210 L 1179,209 L 1182,211 L 1186,210
           L 1192,210 L 1195,201 L 1198,219 L 1202,210 L 1207,208 L 1210,212 L 1214,210
           L 1220,210 L 1223,204 L 1226,216 L 1230,210 L 1235,207 L 1238,213 L 1242,210
           L 1248,210 L 1251,200 L 1254,220 L 1258,210 L 1263,209 L 1266,211 L 1270,210
           L 1276,210 L 1279,202 L 1282,218 L 1286,210 L 1291,206 L 1294,214 L 1298,210
           L 1304,210 L 1307,203 L 1310,217 L 1314,210 L 1319,208 L 1322,212 L 1326,210
           L 1332,210 L 1335,199 L 1338,221 L 1342,210 L 1347,207 L 1350,213 L 1354,210
           L 1360,210 L 1363,201 L 1366,219 L 1370,210 L 1375,208 L 1378,212 L 1382,210
           L 1388,210 L 1391,203 L 1394,217 L 1398,210 L 1403,209 L 1406,211 L 1410,210
           L 1416,210 L 1419,200 L 1422,220 L 1426,210 L 1431,205 L 1434,215 L 1438,210
           L 1444,210 L 1447,202 L 1450,218 L 1454,210 L 1459,208 L 1462,212 L 1466,210
           L 1472,210 L 1475,204 L 1478,216 L 1482,210 L 1487,207 L 1490,213 L 1494,210
           L 1500,210 L 1503,200 L 1506,220 L 1510,210 L 1515,209 L 1518,211 L 1522,210 L 1530,210"
        stroke="#c678dd" stroke-width="1.5" fill="none" opacity="0.8"/>
  <text x="1530" y="214" font-family="Arial,sans-serif" font-size="10" fill="#c678dd" opacity="0.7">Active</text>

  <!-- Glucose / Bio-marker strip -->
  <rect x="910" y="255" width="620" height="55" rx="8" fill="#081520" stroke="#1a4060" stroke-width="1.5" opacity="0.9"/>
  <text x="930" y="274" font-family="Arial,sans-serif" font-size="11" fill="#60cfff" opacity="0.8">⬡ Continuous Glucose Monitor</text>
  <text x="930" y="298" font-family="'Courier New',monospace" font-size="16" font-weight="bold" fill="#f1fa8c">5.6 mmol/L</text>
  <text x="1150" y="298" font-family="Arial,sans-serif" font-size="11" fill="#3ddc84" opacity="0.7">▲ Normal Range</text>
  <!-- Glucose trend bar -->
  <rect x="1280" y="268" width="220" height="8" rx="4" fill="#1a3a50"/>
  <rect x="1280" y="268" width="155" height="8" rx="4" fill="#f1fa8c" opacity="0.7"/>

  <!-- Data stream ticker at bottom -->
  <rect x="0" y="365" width="1600" height="35" fill="#040c18" opacity="0.75"/>
  <text y="388" font-family="'Courier New',monospace" font-size="11" fill="#1a6e9a" opacity="0.8">
    <tspan x="10">SEN:</tspan>
    <tspan fill="#3ddc84" dx="4">HR=72  RR=16  SpO2=98%  TEMP=36.8  GLUCOSE=5.6  STEPS=8421  CAL=342  HRV=45ms  CORTISOL=12.4μg/dL</tspan>
    <tspan fill="#1a6e9a" dx="20">|</tspan>
    <tspan fill="#60cfff" dx="4">STATUS: MONITORING ACTIVE</tspan>
    <tspan fill="#1a6e9a" dx="20">|</tspan>
    <tspan fill="#3ddc84" dx="4">SYNC: CLOUD ✓  AI: ANOMALY DETECTION ✓  ALERT: NONE</tspan>
  </text>
</svg>
