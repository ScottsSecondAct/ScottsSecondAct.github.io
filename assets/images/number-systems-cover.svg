<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Number Systems Cover</title>
  <desc id="desc">A visual representing decimal, binary, and hexadecimal number systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" rx="20"/>

  <g font-family="Consolas, 'Courier New', monospace" fill="#0f172a" text-anchor="middle">
    <text x="600" y="92" font-size="40" font-weight="700">Number Systems</text>
    <text x="600" y="132" font-size="22" fill="#334155">Decimal - Binary - Hexadecimal</text>

    <rect x="90" y="190" width="300" height="360" rx="16" fill="#ffffff" opacity="0.9"/>
    <rect x="450" y="190" width="300" height="360" rx="16" fill="#ffffff" opacity="0.9"/>
    <rect x="810" y="190" width="300" height="360" rx="16" fill="#ffffff" opacity="0.9"/>

    <text x="240" y="245" font-size="30" fill="#0f766e">Base 10</text>
    <text x="240" y="290" font-size="24">3045</text>
    <text x="240" y="335" font-size="20" fill="#475569">3*10^3 + 4*10 + 5</text>

    <text x="600" y="245" font-size="30" fill="#1d4ed8">Base 2</text>
    <text x="600" y="290" font-size="24">101111100101</text>
    <text x="600" y="335" font-size="20" fill="#475569">0b1011_1110_0101</text>

    <text x="960" y="245" font-size="30" fill="#7c3aed">Base 16</text>
    <text x="960" y="290" font-size="24">0xBE5</text>
    <text x="960" y="335" font-size="20" fill="#475569">B*16^2 + E*16 + 5</text>

    <text x="240" y="420" font-size="19" fill="#64748b">Digits: 0-9</text>
    <text x="600" y="420" font-size="19" fill="#64748b">Digits: 0, 1</text>
    <text x="960" y="420" font-size="19" fill="#64748b">Digits: 0-9, A-F</text>

    <text x="600" y="608" font-size="24" fill="#1e293b">Understanding representation is foundational to computing.</text>
  </g>
</svg>
